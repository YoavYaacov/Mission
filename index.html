<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אבישג חוגגת 30</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 4px solid #FFD700;
            padding: 30px;
            border-radius: 20px;
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            max-width: 80%;
        }
        h1 {
            color: #FFD700;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .main-button {
            background-color: #FFD700;
            color: black;
            padding: 20px 40px;
            font-size: 1.5em;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .main-button:active {
            transform: scale(0.95);
        }
        .footer {
            margin-top: 50px;
            font-size: 1em;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>המירוץ למיליון</h1>
        <p>אבישג חוגגת 30</p>
        <a href="
            https://canva.link/jicw226ovuzrq74
            " class="main-button">
            לחצי למשימה הבאה! 🚩
        </a>
    </div>

    <div class="footer">
        הפקת המירוץ: יואב & גלעד בע"מ  ❤️
    </div>

</body>
</html>
